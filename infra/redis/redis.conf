# Halley Redis configuration.
#
# AOF (Append-Only File) is ON from day 1 per ARCHITECTURE §3.10 and
# docs/plan/phase-1-week-1.md. The ingester does not use Redis in
# Week 1, but Redis in the Halley architecture is a durable buffer
# (halley:spans stream) and a job queue (halley:jobs:*). Both roles
# require crash durability. Turning AOF on later would require a
# migration; turning it on now is free.
#
# `appendfsync everysec` is the recommended middle ground between
# durability and throughput: at most one second of data is lost on a
# full host crash, and fsync cost is amortized across writes.

appendonly yes
appendfsync everysec

# Persist the AOF under /data, which docker-compose mounts as a volume.
dir /data
appendfilename "appendonly.aof"

# Halley — local development stack.
#
# Week 2: dbmate is now the sole migration runner for both ClickHouse and
# Postgres. The initdb.d volume mounts from Week 1 have been removed.
# See docs/DECISIONS.md D24 for the migration tooling decision.
#
# Secrets: do not embed credentials here. docker compose automatically
# loads a sibling `.env` file; `.env.example` lists the expected keys.

services:

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    # Alpine tag for smaller image; 24.8 is the LTS line current as of
    # May 2026. FixedString and ReplacingMergeTree behavior we rely on
    # are stable across 23.x/24.x.
    container_name: halley-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-halley}
      # Let a blank password through in dev without tripping the image's
      # safety check. We explicitly accept this risk for local only.
      # See docs/DECISIONS.md D14.
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # native protocol (for clickhouse-client and dbmate)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # wget --spider is not supported on the Alpine busybox wget.
      # Use clickhouse-client per the Week 1 plan spec. See DECISIONS.md D10.
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: halley-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-halley}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-halley}
      POSTGRES_DB: ${POSTGRES_DB:-halley}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-halley} -d $${POSTGRES_DB:-halley}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: halley-redis
    restart: unless-stopped
    # Load our AOF-enabled config (ARCHITECTURE §3.10). The default
    # redis.conf inside the image does NOT enable AOF.
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      # Host port 6380 → container port 6379.
      # A native Redis on the dev machine commonly binds localhost:6379,
      # shadowing the Docker one. Remapping to 6380 mirrors the Postgres
      # fix (5433:5432). Host-side code (npm run dev, scripts) uses
      # REDIS_URL=redis://localhost:6380/0; Docker-internal services use
      # redis://redis:6379/0 (in-network, no port translation needed).
      - "6380:6379"
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  # ---------- Migration runner: ClickHouse (Week 2) ----------
  # Runs dbmate migrations against ClickHouse and exits (restart: no).
  # Uses the native protocol port (9000) as required by dbmate's
  # ClickHouse driver. See docs/DECISIONS.md D24.
  migrate-clickhouse:
    image: ghcr.io/amacneil/dbmate:latest
    container_name: halley-migrate-clickhouse
    restart: "no"
    environment:
      DATABASE_URL: "clickhouse://${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-}@clickhouse:9000/${CLICKHOUSE_DATABASE:-halley}"
    volumes:
      - ./db/clickhouse/migrations:/db/migrations
    command: ["--no-dump-schema", "up"]
    depends_on:
      clickhouse:
        condition: service_healthy

  # ---------- Migration runner: Postgres (Week 2) ----------
  # Runs dbmate migrations against Postgres and exits (restart: no).
  # See docs/DECISIONS.md D24.
  migrate-postgres:
    image: ghcr.io/amacneil/dbmate:latest
    container_name: halley-migrate-postgres
    restart: "no"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-halley}:${POSTGRES_PASSWORD:-halley}@postgres:5432/${POSTGRES_DB:-halley}?sslmode=disable"
    volumes:
      - ./db/postgres/migrations:/db/migrations
    command: ["--no-dump-schema", "up"]
    depends_on:
      postgres:
        condition: service_healthy

  # ---------- Ingester ----------
  ingester:
    build:
      context: ./ingester
    container_name: halley-ingester
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host-side REDIS_URL (localhost:6380) with the in-network name.
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "4318:4318"  # OTLP/HTTP
      - "4317:4317"  # OTLP/gRPC
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-clickhouse:
        condition: service_completed_successfully
      migrate-postgres:
        condition: service_completed_successfully
    healthcheck:
      # Use curl, NOT `wget --spider`: Alpine busybox wget does not
      # support --spider. See docs/DECISIONS.md D10 and D15.
      test: ["CMD", "curl", "-fsS", "http://localhost:4318/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------- Dashboard (Week 2 Day 3) ----------
  dashboard:
    build:
      context: ./dashboard
    container_name: halley-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the container, Postgres/Redis are reachable at compose service
      # names on their internal ports — NOT the host-remapped ports (5433/6380).
      POSTGRES_URL: "postgres://${POSTGRES_USER:-halley}:${POSTGRES_PASSWORD:-halley}@postgres:5432/${POSTGRES_DB:-halley}"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "3000:3000"
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ingester:
        condition: service_healthy
    healthcheck:
      # node:20-alpine has busybox wget. Use 127.0.0.1 explicitly —
      # 'localhost' may not resolve correctly inside the container when
      # HOSTNAME is set to 0.0.0.0. See DECISIONS.md D25.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------- Worker (Phase 5 Week 9) ----------
  # BullMQ background worker for invariant inference and bisect jobs.
  # D-18: BullMQ uses prefix "halley:worker:" — does NOT touch
  # halley:spans / halley:writers / halley:live:* (ingester keys).
  # D-21: Docker rebuild at most once per day it changes.
  worker:
    build:
      context: ./worker
    container_name: halley-worker
    restart: unless-stopped
    env_file: .env
    environment:
      # In-network: use compose service names and internal ports.
      POSTGRES_URL: "postgres://${POSTGRES_USER:-halley}:${POSTGRES_PASSWORD:-halley}@postgres:5432/${POSTGRES_DB:-halley}"
      REDIS_URL: "redis://redis:6379/0"
      # Fixture writer target repo (Day 4). Mounted below; the code default
      # for host runs is ./examples/replay-target (resolved from cwd).
      HALLEY_FIXTURE_REPO_PATH: "/repo"
    volumes:
      # Mount the dev sample repo so the worker can write fixture files.
      # In production this would be a checked-out user repo or a GitHub App
      # workspace (Week 10). For dev, examples/replay-target is the stand-in.
      - ./examples/replay-target:/repo
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  clickhouse-data:
  clickhouse-logs:
  postgres-data:
  redis-data:
